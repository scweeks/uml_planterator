name: CI - JDT LS System Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  jdtls-system:
    name: JDT LS system tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download and unpack JDT LS
        id: setup-jdtls
        env:
          JDTLS_URL: ${{ secrets.JDTLS_URL }}
        run: |
          bash scripts/setup_jdtls.sh
          LAUNCHER=$(find "$HOME"/.cache/jdtls -name "*.jar" | head -n1)
          echo "launcher=$LAUNCHER" >> "$GITHUB_OUTPUT"

      - name: Run system tests
        env:
          UML_PLANETATOR_JDTLS: ${{ steps.setup-jdtls.outputs.launcher }}
        run: |
          pytest tests/system/test_java_jdtls_integration.py -q
